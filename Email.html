<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="icon" type="image/jpeg" href="images/logo.jpg">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .contact-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .contact-card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }
        .contact-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .contact-header i {
            font-size: 3rem;
            color: #0d6efd;
            margin-bottom: 15px;
        }
        .form-label {
            font-weight: 500;
            color: #495057;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="contact-container bg-light">
        <div class="contact-card">
            <div class="contact-header">
                <i class="bi bi-envelope-fill"></i>
                <h2>Contact Us</h2>
                <p class="text-muted">We'd love to hear from you. Send us a message!</p>
            </div>

            <form action="https://formspree.io/f/mkgyprkr" method="POST">
                <!-- First Name -->
                <div class="mb-3">
                    <label for="firstName" class="form-label">First Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="firstName" name="firstName" required>
                </div>

                <!-- Last Name -->
                <div class="mb-3">
                    <label for="lastName" class="form-label">Last Name <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="lastName" name="lastName" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address <span class="text-danger">*</span></label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>

                <!-- Subject -->
                <div class="mb-3">
                    <label for="subject" class="form-label">Subject <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" id="subject" name="subject" required>
                </div>

                <!-- Message -->
                <div class="mb-4">
                    <label for="message" class="form-label">Message <span class="text-danger">*</span></label>
                    <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary btn-submit">
                    <i class="bi bi-send-fill me-2"></i>Send Message
                </button>
            </form>

            <!-- Success Message (hidden by default) -->
            <div class="alert alert-success mt-3 d-none" id="successMessage">
                <i class="bi bi-check-circle-fill me-2"></i>Thank you! Your message has been sent successfully.
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
